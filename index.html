<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vibration Universe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 10px auto;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: cyan;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: white;
    }

    .stop {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

  <h1>🌌 Vibration Universe</h1>

  <!-- Buttons -->
  <button onclick="earth()">Earth Rotation</button>
  <button onclick="moon()">Moon Rotation</button>
  <button onclick="universe()">Universe Formation</button>
  <button onclick="star()">Star Formation</button>
  <button onclick="collision()">Collision</button>
  <button onclick="acceleration()">Acceleration</button>
  <button onclick="deceleration()">Deceleration</button>
  <button onclick="sine()">Sine Wave</button>
  <button onclick="cosine()">Cosine Wave</button>
  <button onclick="oscillation()">Oscillation</button>

  <button class="stop" onclick="stopAll()">STOP</button>

  <script>
    let running = false;

    function stopAll() {
      running = false;
      navigator.vibrate(0);
    }

    function loop(fn, delay) {
      running = true;
      function run() {
        if (!running) return;
        fn();
        setTimeout(run, delay);
      }
      run();
    }

    // 🌍 Earth Rotation (slow steady)
    function earth() {
      loop(() => navigator.vibrate([200, 800]), 1000);
    }

    // 🌙 Moon Rotation (slower, softer)
    function moon() {
      loop(() => navigator.vibrate([100, 900]), 1000);
    }

    // 🌌 Universe Formation (gradual build)
    function universe() {
      loop(() => navigator.vibrate([50,100,100,100,200,100,300]), 1500);
    }

    // ⭐ Star Formation (pulse grows)
    function star() {
      loop(() => navigator.vibrate([100,200,200,200,300]), 1500);
    }

    // 💥 Collision (sudden hit)
    function collision() {
      loop(() => navigator.vibrate([500,100,200]), 1200);
    }

    // 🚀 Acceleration (gets faster)
    function acceleration() {
      loop(() => navigator.vibrate([300,200,200,150,100,100]), 1200);
    }

    // 🛑 Deceleration (slows down)
    function deceleration() {
      loop(() => navigator.vibrate([100,100,200,150,300,200]), 1200);
    }

    // 🌊 Sine Wave (smooth pattern)
    function sine() {
      loop(() => navigator.vibrate([100,200,300,200,100]), 1200);
    }

    // 🌊 Cosine Wave (shifted sine)
    function cosine() {
      loop(() => navigator.vibrate([300,200,100,200,300]), 1200);
    }

    // 🔁 Oscillation (repeating)
    function oscillation() {
      loop(() => navigator.vibrate([200,200]), 600);
    }

  </script>

</body>
</html>
