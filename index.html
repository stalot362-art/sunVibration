<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulsar + Black Hole Vibration</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #000;
      color: white;
      margin-top: 100px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin: 10px;
      background: cyan;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>⚡🌌 Pulsar + Black Hole</h1>

  <button onclick="startPattern()">Start</button>
  <button onclick="stopPattern()">Stop</button>

  <script>
    let running = false;

    function startPattern() {
      running = true;
      runSequence();
    }

    function runSequence() {
      if (!running) return;

      // ⚡ Pulsar (short, reliable)
      navigator.vibrate([100, 300, 100, 300]);

      // Then run black hole after pulsar finishes
      setTimeout(() => {
        if (!running) return;

        // 🌌 Black hole (shortened + stronger)
        navigator.vibrate([100, 100, 200, 100, 300, 100, 400]);

      }, 1000);

      // Repeat loop safely
      setTimeout(() => {
        runSequence();
      }, 2500);
    }

    function stopPattern() {
      running = false;
      navigator.vibrate(0);
    }
  </script>

</body>
</html>
