<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Black Hole Vibration</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: radial-gradient(circle, #0a0a0a, #000000);
      color: white;
      margin-top: 100px;
    }

    h1 {
      font-size: 28px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: purple;
      color: white;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: violet;
    }
  </style>
</head>

<body>

  <h1>🌌 Black Hole Vibration</h1>
  <p>Experience a space-time ripple</p>

  <button onclick="blackHolePattern()">Start Black Hole</button>
  <button onclick="stopVibration()">Stop</button>

  <script>
    // 🌌 Black Hole Chirp Pattern
    function blackHolePattern() {
      // Increasing intensity (chirp)
      const pattern = [
        100, 150,
        150, 120,
        200, 100,
        300, 80,
        400, 60,
        500
      ];

      navigator.vibrate(pattern);

      // Optional: repeat the pattern after it ends
      window.blackHoleInterval = setInterval(() => {
        navigator.vibrate(pattern);
      }, 2000);
    }

    // Stop vibration
    function stopVibration() {
      navigator.vibrate(0);
      clearInterval(window.blackHoleInterval);
    }
  </script>

</body>
</html>
